<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="screen-orientation" content="landscape">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Shadow Tagger</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #0a0a0a;
      width: 100%;
      height: 100dvh; /* dynamic viewport height — accounts for mobile browser chrome */
      overflow: hidden;
      touch-action: none;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #game-container {
      width: 100%;
      height: 100%;
    }
    canvas { display: block; }

    /* "Rotate your phone" overlay — visible only in portrait on touch devices */
    #rotate-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #0a0a1a;
      color: #00ff88;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: monospace;
      text-align: center;
      gap: 20px;
    }
    #rotate-overlay .phone-icon {
      font-size: 64px;
      animation: rotate-hint 1.5s ease-in-out infinite;
    }
    #rotate-overlay p {
      font-size: 18px;
    }
    @keyframes rotate-hint {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(90deg); }
    }

    @media (orientation: portrait) and (pointer: coarse) {
      #rotate-overlay { display: flex; }
    }
  </style>
</head>
<body>
  <div id="rotate-overlay">
    <div class="phone-icon">&#128241;</div>
    <p>Obróć telefon do pozycji poziomej</p>
    <p style="font-size: 12px; color: #445566;">Rotate your phone to landscape</p>
  </div>
  <div id="game-container"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
