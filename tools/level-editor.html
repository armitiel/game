<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Shadow Tagger — Level Editor</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: #eee; font-family: monospace; display: flex; height: 100vh; overflow: hidden; }

#sidebar {
  width: 260px; background: #222; padding: 12px; overflow-y: auto; flex-shrink: 0;
  display: flex; flex-direction: column; gap: 8px;
}
#sidebar h2 { font-size: 14px; color: #0f8; margin-bottom: 4px; }
#sidebar label { font-size: 12px; display: block; margin: 2px 0; }
#sidebar select, #sidebar input, #sidebar button {
  font-family: monospace; font-size: 12px; padding: 4px 6px; border: 1px solid #555; background: #333; color: #eee; border-radius: 3px; width: 100%;
}
#sidebar button { cursor: pointer; background: #335; border-color: #558; }
#sidebar button:hover { background: #447; }
#sidebar button.active { background: #0a5; border-color: #0d8; }
#sidebar button.danger { background: #733; border-color: #a55; }

.tool-btn { display: inline-block; width: 48%; margin: 1px; text-align: center; padding: 6px 2px; font-size: 11px; }
.section { border-top: 1px solid #444; padding-top: 8px; margin-top: 4px; }

#canvas-wrap { flex: 1; position: relative; overflow: auto; background: #111; }
canvas { display: block; cursor: crosshair; }

#props {
  position: absolute; bottom: 10px; left: 270px; background: rgba(0,0,0,0.85);
  padding: 8px 12px; border-radius: 4px; font-size: 12px; border: 1px solid #555;
  display: none; max-width: 500px;
}
#props input { width: 60px; background: #333; color: #eee; border: 1px solid #555; padding: 2px 4px; font-family: monospace; font-size: 12px; }
#props label { margin-right: 8px; }

#status { position: absolute; top: 4px; right: 10px; font-size: 11px; color: #888; }
#saveIndicator { font-size: 10px; color: #0a5; text-align: center; padding: 2px; transition: opacity 0.3s; }
#saveIndicator.flash { color: #0f8; }
#help { font-size: 10px; color: #777; line-height: 1.4; }
</style>
</head>
<body>

<div id="sidebar">
  <h2>Shadow Tagger Level Editor</h2>

  <div>
    <label>Widok trybu:</label>
    <select id="levelModeFilter" style="width:140px">
      <option value="stealth">Stealth</option>
      <option value="puzzle">Puzzle</option>
      <option value="tower">Tower</option>
    </select>
    <label>Level:</label>
    <select id="levelSelect" style="width:140px"></select>
    <button id="btnAddLevel" title="Nowy level" style="background:#053;border-color:#0a6;color:#0f8;padding:2px 8px;cursor:pointer;font-weight:bold;">+</button>
    <button id="btnDelLevel" title="Usun level" style="background:#530;border-color:#a60;color:#f86;padding:2px 8px;cursor:pointer;font-weight:bold;">-</button>
  </div>

  <div id="levelMeta" style="font-size:11px;display:flex;flex-direction:column;gap:3px;">
    <div>
      <label>Nazwa: <input id="metaName" style="width:120px;background:#222;color:#eee;border:1px solid #555;font-size:11px;padding:1px 4px" /></label>
      <label>Tryb: <select id="metaMode" style="width:80px;background:#222;color:#eee;border:1px solid #555;font-size:11px">
        <option value="stealth">Stealth</option>
        <option value="puzzle">Puzzle</option>
        <option value="tower">Tower</option>
      </select></label>
    </div>
    <div>
      <label>Opis: <input id="metaDesc" style="width:220px;background:#222;color:#eee;border:1px solid #555;font-size:11px;padding:1px 4px" /></label>
    </div>
    <div>
      <label>W: <input id="metaW" type="number" style="width:55px;background:#222;color:#eee;border:1px solid #555;font-size:11px;padding:1px 4px" /></label>
      <label>H: <input id="metaH" type="number" style="width:55px;background:#222;color:#eee;border:1px solid #555;font-size:11px;padding:1px 4px" /></label>
    </div>
  </div>

  <div class="section">
    <label>Narzedzie:</label>
    <button class="tool-btn active" data-tool="select">Zaznacz</button>
    <button class="tool-btn" data-tool="platform">Platforma</button>
    <button class="tool-btn" data-tool="ground">Grunt</button>
    <button class="tool-btn" data-tool="ladder">Drabinka</button>
    <button class="tool-btn" data-tool="shadow">Cien</button>
    <button class="tool-btn" data-tool="fillWall">Sciana tla</button>
    <button class="tool-btn" data-tool="paintSpot">Mural</button>
    <button class="tool-btn" data-tool="paintCan">Puszka</button>
    <button class="tool-btn" data-tool="cop">Policjant</button>
    <button class="tool-btn" data-tool="trashCan">Kosz</button>
    <button class="tool-btn" data-tool="lamp">Lampa</button>
    <button class="tool-btn" data-tool="checkpoint">Checkpoint</button>
    <button class="tool-btn" data-tool="wire">Kabel</button>
    <button class="tool-btn" data-tool="paper">Gazeta</button>
  </div>

  <div class="section">
    <label>Siatka: <input id="gridSize" type="number" value="10" min="1" max="100" style="width:40px"> px</label>
    <label><input id="snapGrid" type="checkbox" checked> Przypnij do siatki</label>
  </div>

  <div class="section">
    <button id="btnDuplicate">Duplikuj [D]</button>
    <button id="btnDelete" class="danger">Usun [Del]</button>
  </div>

  <div class="section">
    <button id="btnSaveToGame" style="background:#085;border-color:#0c8;font-size:14px;padding:10px 16px;color:#fff;font-weight:bold;cursor:pointer;width:100%;">&#128190; Zapisz do gry</button>
    <div id="saveIndicator">Autosave wlaczony</div>
    <button id="btnExport" style="background:#063;border-color:#0a5;font-size:13px;padding:8px;">Eksportuj levels.js</button>
    <button id="btnCopy" style="margin-top:4px;">Kopiuj do schowka</button>
    <button id="btnImport" style="margin-top:4px;">Importuj JSON...</button>
    <button id="btnReset" class="danger" style="margin-top:4px;">Resetuj do domyslnych</button>
  </div>

  <div class="section" id="help">
    <b>Skroty:</b><br>
    Klik = zaznacz/postaw<br>
    Drag = przesun / rysuj nowy<br>
    Del = usun zaznaczony<br>
    D = duplikuj<br>
    Ctrl+Z = cofnij<br>
    Ctrl+S = eksportuj<br>
    Scroll = przewin (duze levele)<br>
  </div>
</div>

<div id="canvas-wrap">
  <canvas id="canvas"></canvas>
  <div id="status"></div>
</div>

<div id="props"></div>

<script>
// ============================================================
// LEVEL DATA (embedded from levels.js)
// ============================================================
const GAME_W = 1280, GAME_H = 720;

const LEVELS_SOURCE = [

    ],

      { x: 170, y: GAME_H - 32 - 24 },

    ],

    paintings: ['painting_mural_big'],
    ground: [{ x: 0, y: 1300 - 32, w: 800 }],
    platforms: [
      { x: 0, y: 1300 - 250, w: 280 }, { x: 420, y: 1300 - 250, w: 380 },
      { x: 0, y: 1300 - 500, w: 320 }, { x: 480, y: 1300 - 500, w: 320 },
      { x: 0, y: 1300 - 750, w: 280 }, { x: 420, y: 1300 - 750, w: 380 },
      { x: 0, y: 1300 - 1000, w: 800 },
    ],
    ladders: [
      { x: 350, topY: 1300 - 250, bottomY: 1300 - 32, minX: 280, maxX: 420 },
      { x: 150, topY: 1300 - 500, bottomY: 1300 - 250, minX: 50, maxX: 380 },
      { x: 620, topY: 1300 - 750, bottomY: 1300 - 500, minX: 450, maxX: 720 },
      { x: 250, topY: 1300 - 1000, bottomY: 1300 - 750, minX: 80, maxX: 420 },
    ],
    shadows: [
      { x: 50, y: 1300 - 220, w: 60, h: 140 },

      { x: 100, y: 1300 - 730, w: 60, h: 140 },
    ],
    paintCans: [
      { x: 120, y: 1300 - 290 }, { x: 650, y: 1300 - 540 },
      { x: 180, y: 1300 - 540 }, { x: 600, y: 1300 - 790 },
      { x: 150, y: 1300 - 790 }, { x: 400, y: 1300 - 1040 },
    ],
    paintSpots: [
      { x: 400, y: 1300 - 620, w: 480, h: 576, paintingKey: 'painting_mural_big' },
    ],
    trashCans: [
      { x: 500, y: 1300 - 32 - 24 }, { x: 200, y: 1300 - 500 - 24 },
    ],
    cops: [
      { x: 500, y: 1300 - 55, minX: 100, maxX: 760 },
      { x: 300, y: 1300 - 520, minX: 100, maxX: 500 },
    ],
    foregroundWires: [
      { x1: 0, y1: 1300 - 380, x2: 800, y2: 1300 - 400 },
      { x1: 0, y1: 1300 - 880, x2: 800, y2: 1300 - 860 },
    ],
  }
];

// Deep clone — server (levels.js) is the authoritative source.
// localStorage is only a fallback when server is unavailable.
const STORAGE_KEY = 'shadowTaggerLevelEditor';
let levels = JSON.parse(JSON.stringify(LEVELS_SOURCE));
let _levelsLoadedFromServer = false;
let currentLevelIdx = 0;
let level = levels[0];

// Load authoritative data from editor-server (parsed levels.js with mode info)
(async function loadFromServer() {
  try {
    const resp = await fetch('/levels-data');
    if (!resp.ok) throw new Error('not ok');
    const serverLevels = await resp.json();
    if (Array.isArray(serverLevels) && serverLevels.length > 0) {
      levels = serverLevels;
      level = levels[currentLevelIdx] || levels[0];
      _levelsLoadedFromServer = true;
      if (typeof refreshLevelSelect === 'function') refreshLevelSelect();
      resizeCanvas();
      draw();
      const ind = document.getElementById('saveIndicator');
      if (ind) { ind.textContent = 'Zaladowano z levels.js'; ind.style.color = '#5a5'; }
      console.log('[Editor] Loaded levels from server — modes:', levels.map(l => l.name + ':' + l.mode));
    }
  } catch (e) {
    // Server unavailable — try localStorage fallback
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      try {
        const parsed = JSON.parse(saved);
        if (Array.isArray(parsed) && parsed.length > 0) {
          levels = parsed;
          level = levels[currentLevelIdx] || levels[0];
        }
      } catch (e2) { /* ignore */ }
    }
    // Ensure every level has a mode
    levels.forEach(lv => { if (!lv.mode) lv.mode = 'stealth'; });
    if (typeof refreshLevelSelect === 'function') refreshLevelSelect();
    resizeCanvas();
    draw();
    console.log('[Editor] Server not available, using fallback');
  }
})();

let _saveTimer = null;
function autoSave() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(levels));
  // Debounce file save — write at most every 500ms
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(() => saveToFile(), 500);
}

function saveToFile() {
  const code = generateExport();
  console.log('[EDITOR autoSave] Posting to /save, code length:', code.length, 'origin:', window.location.origin);
  fetch('/save', { method: 'POST', body: code })
    .then(r => r.json())
    .then(() => {
      const ind = document.getElementById('saveIndicator');
      if (ind) { ind.textContent = 'Zapisano ' + new Date().toLocaleTimeString(); ind.classList.add('flash'); setTimeout(() => ind.classList.remove('flash'), 600); }
    })
    .catch(() => {
      const ind = document.getElementById('saveIndicator');
      if (ind) { ind.textContent = 'Brak serwera — tylko localStorage'; ind.style.color = '#a55'; }
    });
}

// ============================================================
// STATE
// ============================================================
let tool = 'select';
let selected = null; // { type, index }
let dragging = false;
let dragStart = { x: 0, y: 0 };
let dragOffset = { x: 0, y: 0 };
let drawing = false; // true when creating new element via drag
let drawRect = null;

let undoStack = [];
const MAX_UNDO = 50;

// Mural preview cache: paintingKey -> { cols, rows, colors, palette, grid }
const muralCache = {};
const MURAL_GAME_COLORS = { RED: '#ff3344', BLUE: '#3388ff', YELLOW: '#ffdd33', GREEN: '#33ff88' };

// ============================================================
// ASSET IMAGE LOADING — real sprites for accurate preview
// ============================================================
const ASSETS = {};
const ASSET_PATHS = {
  platform_block: '/assets/sprites/elementy/p1.png',
  brick: '/assets/sprites/elementy/brick.png',
  brick2: '/assets/sprites/elementy/brick2.png',
  ladder_tile: '/assets/sprites/elementy/drabinka.png',
  ladder_plank: '/assets/sprites/elementy/drabinka2.png',
  shadow_img: '/assets/sprites/elementy/shadow.png',
  trash: '/assets/sprites/elementy/trash.png',
  trash2: '/assets/sprites/elementy/trash2.png',
  can: '/assets/sprites/elementy/can.png',
  lamp: '/assets/sprites/elementy/lamp.png',
  blok: '/assets/sprites/elementy/blok.png',
  paper: '/assets/sprites/elementy/paper.png',
};

let assetsLoaded = false;
(function loadAssets() {
  let remaining = Object.keys(ASSET_PATHS).length;
  for (const [key, path] of Object.entries(ASSET_PATHS)) {
    const img = new Image();
    img.onload = () => { ASSETS[key] = img; if (--remaining === 0) { assetsLoaded = true; draw(); } };
    img.onerror = () => { if (--remaining === 0) { assetsLoaded = true; draw(); } };
    img.src = path;
  }
})();

async function loadMuralPreviews() {
  try {
    const resp = await fetch('/mural-list');
    const files = await resp.json();
    for (const f of files) {
      try {
        const r = await fetch('/mural-load?file=' + encodeURIComponent(f));
        const data = await r.json();
        // Key without _mural.json suffix, prefixed with painting_
        const key = 'painting_' + f.replace('_mural.json', '').replace('.json', '');
        muralCache[key] = data;
      } catch (e) { /* skip broken files */ }
    }
  } catch (e) { /* server not available */ }
}
loadMuralPreviews();

async function createNewMuralForSpot(spotIndex) {
  const name = prompt('Nazwa nowego muralu (bez painting_):');
  if (!name || !name.trim()) return;
  const cleanName = name.trim().replace(/\s+/g, '_').toLowerCase();
  const fileName = cleanName + '_mural.json';
  const paintingKey = 'painting_' + cleanName;
  const ps = level.paintSpots[spotIndex];
  // Default grid matching spot proportions
  const aspect = ps.w / ps.h;
  const totalCells = 14 * 14;
  const gridRows = Math.max(2, Math.round(Math.sqrt(totalCells / aspect)));
  const gridCols = Math.max(2, Math.round(gridRows * aspect));
  const defaultMural = {
    cols: gridCols, rows: gridRows,
    colors: ['RED', 'BLUE', 'YELLOW', 'GREEN'],
    palette: { RED: '#ff3344', BLUE: '#3388ff', YELLOW: '#ffdd33', GREEN: '#33ff88' },
    grid: Array.from({length: gridRows}, () => Array(gridCols).fill(-1))
  };
  try {
    await fetch('/mural-save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ file: fileName, data: defaultMural })
    });
    muralCache[paintingKey] = defaultMural;
    pushUndo();
    ps.paintingKey = paintingKey;
    autoSave();
    draw();
    showProps();
    // Open mural editor for the new mural
    window.open(`/tools/mural-editor.html?key=${encodeURIComponent(paintingKey)}&spotW=${ps.w}&spotH=${ps.h}`, '_blank');
  } catch (e) {
    alert('Nie udalo sie zapisac muralu: ' + e.message);
  }
}

// ============================================================
// CANVAS
// ============================================================
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  const scale = getScale();
  canvas.width = level.worldWidth * scale;
  canvas.height = level.worldHeight * scale;
  // Scroll to bottom so ground is visible by default
  const wrap = document.getElementById('canvas-wrap');
  requestAnimationFrame(() => { wrap.scrollTop = wrap.scrollHeight; });
}

function getScale() {
  const wrap = document.getElementById('canvas-wrap');
  const maxW = wrap.clientWidth - 10;
  // Use reference width (GAME_W) so all levels share the same pixel scale
  return Math.min(1, maxW / GAME_W);
}

// ============================================================
// COLORS for element types
// ============================================================
const COLORS = {
  platform: '#667788',
  ground: '#556677',
  ladder: '#aa8844',
  shadow: 'rgba(0,0,80,0.6)',
  fillWall: '#2c284c',
  paintSpot: '#886655',
  paintCan: '#ff8833',
  cop: '#3344aa',
  trashCan: '#888888',
  lamp: '#ffcc44',
  checkpoint: '#00ff88',
  wire: '#ffff44',
  paper: '#c8b88a',
};

// ============================================================
// DRAWING
// ============================================================
function draw() {
  const s = getScale();
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Background — night sky gradient matching GameScene
  const ww = level.worldWidth, wh = level.worldHeight;
  const gradientSteps = 64;
  for (let i = 0; i < gradientSteps; i++) {
    const t = i / (gradientSteps - 1);
    const r = Math.round(8 + t * 18);
    const g = Math.round(8 + t * 18);
    const b = Math.round(32 + t * 48);
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    const sy = Math.floor(canvas.height * i / gradientSteps);
    const sh = Math.ceil(canvas.height / gradientSteps) + 1;
    ctx.fillRect(0, sy, canvas.width, sh);
  }

  // Distant buildings silhouette
  const buildingCount = Math.ceil(ww / 110);
  ctx.fillStyle = '#0d0d20';
  for (let i = 0; i < buildingCount; i++) {
    const bw = 50 + ((i * 37) % 51);
    const bh = 80 + ((i * 67) % (Math.min(wh * 0.4, 400) - 80));
    ctx.fillRect((i * 110 - 20) * s, (wh - bh) * s, bw * s, bh * s);
  }

  // Moon
  ctx.fillStyle = 'rgba(221,238,255,0.8)';
  ctx.beginPath(); ctx.arc((ww - 100) * s, 60 * s, 25 * s, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#0a0a1a';
  ctx.beginPath(); ctx.arc((ww - 90) * s, 55 * s, 22 * s, 0, Math.PI * 2); ctx.fill();

  // Grid
  if (document.getElementById('snapGrid').checked) {
    const gridSz = parseInt(document.getElementById('gridSize').value) || 10;
    ctx.strokeStyle = 'rgba(255,255,255,0.04)';
    ctx.lineWidth = 1;
    for (let x = 0; x < level.worldWidth; x += gridSz) {
      ctx.beginPath(); ctx.moveTo(x * s, 0); ctx.lineTo(x * s, canvas.height); ctx.stroke();
    }
    for (let y = 0; y < level.worldHeight; y += gridSz) {
      ctx.beginPath(); ctx.moveTo(0, y * s); ctx.lineTo(canvas.width, y * s); ctx.stroke();
    }
  }

  // Fill walls — only explicit fillWalls from level data
  (level.fillWalls || []).forEach((fw, i) => {
    _drawBrickWall(ctx, fw.x, fw.y, fw.w, fw.h, s);
    if (isSelected('fillWall', i)) drawSelectionBorder(fw.x, fw.y, fw.w, fw.h, s);
    drawLabel(fw.x + fw.w / 2, fw.y + fw.h / 2, 'SCIANA', s);
  });

  // Ground
  (level.ground || []).forEach((g, i) => {
    if (ASSETS.platform_block) {
      _drawTiledAsset(ctx, ASSETS.platform_block, g.x, g.y, g.w, 32, s, 4);
    } else {
      drawRect2(g.x, g.y, g.w, 32, COLORS.ground, false);
    }
    if (isSelected('ground', i)) drawSelectionBorder(g.x, g.y, g.w, 32, s);
    drawLabel(g.x + g.w / 2, g.y + 16, 'GROUND', s);
  });

  // Shadows
  (level.shadows || []).forEach((sh, i) => {
    if (ASSETS.shadow_img) {
      ctx.drawImage(ASSETS.shadow_img, sh.x * s, sh.y * s, sh.w * s, sh.h * s);
    } else {
      ctx.fillStyle = 'rgba(0,0,80,0.5)';
      ctx.fillRect(sh.x * s, sh.y * s, sh.w * s, sh.h * s);
      ctx.fillStyle = 'rgba(50,70,170,0.4)';
      ctx.fillRect(sh.x * s, sh.y * s, 2 * s, sh.h * s);
      ctx.fillRect((sh.x + sh.w) * s - 2 * s, sh.y * s, 2 * s, sh.h * s);
    }
    if (isSelected('shadow', i)) drawSelectionBorder(sh.x, sh.y, sh.w, sh.h, s);
    drawLabel(sh.x + sh.w / 2, sh.y + sh.h / 2, 'CIEN', s);
  });

  // Paint spots (murals) — subtle outline only, background wall shows through
  (level.paintSpots || []).forEach((ps, i) => {
    const px = ps.x - ps.w / 2, py = ps.y - ps.h / 2;
    // Mural grid preview overlay (if data loaded)
    const mural = muralCache[ps.paintingKey];
    if (mural && mural.grid && mural.cols && mural.rows) {
      const cellW = ps.w / mural.cols;
      const cellH = ps.h / mural.rows;
      const pal = mural.palette || {};
      const cols2 = mural.colors || [];
      for (let mr = 0; mr < mural.rows; mr++) {
        for (let mc = 0; mc < mural.cols; mc++) {
          const ci = mural.grid[mr] && mural.grid[mr][mc];
          if (ci == null || ci < 0) continue;
          const cName = cols2[ci];
          const hex = (pal && pal[cName]) || MURAL_GAME_COLORS[cName] || '#888';
          ctx.fillStyle = hex;
          ctx.globalAlpha = 0.85;
          ctx.fillRect((px + mc * cellW) * s, (py + mr * cellH) * s, Math.ceil(cellW * s), Math.ceil(cellH * s));
        }
      }
      ctx.globalAlpha = 1;
    }
    // Subtle outline to mark the mural area
    ctx.strokeStyle = 'rgba(255,255,255,0.25)';
    ctx.lineWidth = 1;
    ctx.setLineDash([6, 4]);
    ctx.strokeRect(px * s, py * s, ps.w * s, ps.h * s);
    ctx.setLineDash([]);
    if (isSelected('paintSpot', i)) drawSelectionBorder(px, py, ps.w, ps.h, s);
    drawLabel(ps.x, ps.y, ps.paintingKey || 'MURAL', s);
  });

  // Platforms
  (level.platforms || []).forEach((p, i) => {
    if (ASSETS.platform_block) {
      _drawTiledAsset(ctx, ASSETS.platform_block, p.x, p.y, p.w, 32, s, 4);
    } else {
      drawRect2(p.x, p.y, p.w, 32, COLORS.platform, false);
    }
    if (isSelected('platform', i)) drawSelectionBorder(p.x, p.y, p.w, 32, s);
    drawLabel(p.x + p.w / 2, p.y + 16, 'PLATF', s);
  });

  // Ladders
  (level.ladders || []).forEach((l, i) => {
    const lMinY = Math.min(l.topY, l.bottomY), lMaxY = Math.max(l.topY, l.bottomY);
    const lw = 34, lx = l.x - lw / 2, ly = lMinY, lh = lMaxY - lMinY;
    if (ASSETS.ladder_tile) {
      // Cast shadow (matches GameScene: +5x, +4y, black alpha 0.35)
      ctx.fillStyle = 'rgba(0,0,0,0.35)';
      ctx.fillRect((lx + 5) * s, (ly + 4) * s, lw * s, (lh - 8) * s);
      // Tile ladder images vertically like the game does
      const tileH = ASSETS.ladder_tile.height;
      const tileW = ASSETS.ladder_tile.width;
      const scaleRatio = (lw * s) / tileW;
      for (let ty = 0; ty < lh; ty += tileH / scaleRatio) {
        const drawH = Math.min(tileH / scaleRatio, lh - ty);
        ctx.drawImage(ASSETS.ladder_tile, 0, 0, tileW, drawH * scaleRatio,
          lx * s, (ly + ty) * s, lw * s, drawH * s);
      }
      // Planks overlay
      if (ASSETS.ladder_plank) {
        const plankH = ASSETS.ladder_plank.height;
        const rungSpacing = 32;
        for (let ry = 0; ry < lh; ry += rungSpacing) {
          ctx.drawImage(ASSETS.ladder_plank, lx * s, (ly + ry) * s, lw * s, (plankH * scaleRatio) * s);
        }
      }
    } else {
      ctx.fillStyle = 'rgba(170,136,68,0.6)';
      ctx.fillRect(lx * s, ly * s, lw * s, lh * s);
      ctx.strokeStyle = '#aa8844';
      ctx.lineWidth = 2;
      for (let ry = lMinY; ry < lMaxY; ry += 20) {
        ctx.beginPath(); ctx.moveTo(lx * s, ry * s); ctx.lineTo((lx + lw) * s, ry * s); ctx.stroke();
      }
      ctx.beginPath(); ctx.moveTo(lx * s, ly * s); ctx.lineTo(lx * s, (ly + lh) * s); ctx.stroke();
      ctx.beginPath(); ctx.moveTo((lx + lw) * s, ly * s); ctx.lineTo((lx + lw) * s, (ly + lh) * s); ctx.stroke();
    }
    if (isSelected('ladder', i)) drawSelectionBorder(lx, ly, lw, lh, s);
    drawLabel(l.x, lMinY + lh / 2, 'DRABIN', s);
  });

  // Paint cans
  const CAN_COLOR_MAP = { RED: '#ff3344', BLUE: '#3388ff', YELLOW: '#ffdd33', GREEN: '#33ff88' };
  (level.paintCans || []).forEach((c, i) => {
    if (ASSETS.can) {
      const cw = 20, ch = 28;
      // Draw can image
      ctx.drawImage(ASSETS.can, (c.x - cw / 2) * s, (c.y - ch / 2) * s, cw * s, ch * s);
      // Color tint overlay
      if (c.color && CAN_COLOR_MAP[c.color]) {
        ctx.globalAlpha = 0.4;
        ctx.fillStyle = CAN_COLOR_MAP[c.color];
        ctx.fillRect((c.x - cw / 2) * s, (c.y - ch * 0.1) * s, cw * s, ch * 0.5 * s);
        ctx.globalAlpha = 1;
      }
    } else {
      ctx.fillStyle = c.color ? (CAN_COLOR_MAP[c.color] || COLORS.paintCan) : COLORS.paintCan;
      ctx.beginPath();
      ctx.arc(c.x * s, c.y * s, 8 * s, 0, Math.PI * 2);
      ctx.fill();
    }
    if (isSelected('paintCan', i)) {
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(c.x * s, c.y * s, 12 * s, 0, Math.PI * 2); ctx.stroke();
    }
    drawLabel(c.x, c.y - 18, c.color ? c.color : 'CAN', s);
  });

  // Cops
  (level.cops || []).forEach((c, i) => {
    // Patrol range
    ctx.fillStyle = 'rgba(50,70,170,0.15)';
    ctx.fillRect(c.minX * s, (c.y - 30) * s, (c.maxX - c.minX) * s, 60 * s);
    ctx.strokeStyle = 'rgba(50,70,170,0.4)';
    ctx.lineWidth = 1;
    ctx.strokeRect(c.minX * s, (c.y - 30) * s, (c.maxX - c.minX) * s, 60 * s);
    // Cop body
    ctx.fillStyle = COLORS.cop;
    ctx.fillRect((c.x - 10) * s, (c.y - 20) * s, 20 * s, 40 * s);
    if (isSelected('cop', i)) drawSelectionBorder(c.x - 15, c.y - 25, 30, 50, s);
    drawLabel(c.x, c.y - 28, 'COP', s);
  });

  // Trash cans
  (level.trashCans || []).forEach((t, i) => {
    const trashImg = (i % 2 === 0) ? ASSETS.trash : (ASSETS.trash2 || ASSETS.trash);
    if (trashImg) {
      const tw = 36, th = 36;
      ctx.drawImage(trashImg, (t.x - tw / 2) * s, (t.y - th / 2) * s, tw * s, th * s);
    } else {
      ctx.fillStyle = COLORS.trashCan;
      ctx.fillRect((t.x - 12) * s, (t.y - 12) * s, 24 * s, 24 * s);
    }
    if (isSelected('trashCan', i)) drawSelectionBorder(t.x - 15, t.y - 15, 30, 30, s);
    drawLabel(t.x, t.y - 18, 'KOSZ', s);
  });

  // Papers (gazety)
  (level.papers || []).forEach((p, i) => {
    const pw = 36, ph = 28;
    ctx.save();
    ctx.translate(p.x * s, p.y * s);
    ctx.rotate(((p.angle || 0) * Math.PI) / 180);
    if (ASSETS.paper) {
      ctx.drawImage(ASSETS.paper, (-pw / 2) * s, (-ph) * s, pw * s, ph * s);
    } else {
      ctx.fillStyle = COLORS.paper;
      ctx.fillRect((-pw / 2) * s, (-ph) * s, pw * s, ph * s);
      ctx.strokeStyle = 'rgba(0,0,0,0.3)';
      ctx.lineWidth = 1;
      ctx.strokeRect((-pw / 2) * s, (-ph) * s, pw * s, ph * s);
    }
    ctx.restore();
    if (isSelected('paper', i)) drawSelectionBorder(p.x - pw / 2, p.y - ph, pw, ph, s);
    drawLabel(p.x, p.y - ph - 4, 'GAZ', s);
  });

  // Lamps — light cone + image
  (level.lamps || []).forEach((lm, i) => {
    const r = lm.radius || 120;
    const intensity = lm.intensity || 0.35;
    // Light cone (downward trapezoid from lamp bulb — offset right & up)
    const headX = (lm.x + 12) * s;
    const headY = (lm.y - 148) * s;
    const coneTopW = 10 * s;
    const coneBottomW = r * s;
    const coneH = (r * 1.2) * s;
    // Radial glow
    const grd = ctx.createRadialGradient(headX, headY + coneH * 0.3, coneTopW, headX, headY + coneH * 0.5, coneBottomW);
    grd.addColorStop(0, `rgba(255,220,120,${intensity})`);
    grd.addColorStop(0.6, `rgba(255,200,80,${intensity * 0.4})`);
    grd.addColorStop(1, 'rgba(255,180,60,0)');
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(headX - coneTopW, headY);
    ctx.lineTo(headX + coneTopW, headY);
    ctx.lineTo(headX + coneBottomW, headY + coneH);
    ctx.lineTo(headX - coneBottomW, headY + coneH);
    ctx.closePath();
    ctx.clip();
    ctx.fillStyle = grd;
    ctx.fillRect(headX - coneBottomW, headY, coneBottomW * 2, coneH);
    ctx.restore();
    // Lamp image
    if (ASSETS.lamp) {
      const lw = 40, lh = 150;
      ctx.drawImage(ASSETS.lamp, (lm.x - lw / 2) * s, (lm.y - lh) * s, lw * s, lh * s);
    } else {
      ctx.strokeStyle = COLORS.lamp;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(lm.x * s, lm.y * s);
      ctx.lineTo(lm.x * s, (lm.y - 140) * s);
      ctx.stroke();
      ctx.fillStyle = '#ffdd66';
      ctx.beginPath();
      ctx.arc(lm.x * s, (lm.y - 140) * s, 6 * s, 0, Math.PI * 2);
      ctx.fill();
    }
    if (isSelected('lamp', i)) drawSelectionBorder(lm.x - 25, lm.y - 155, 50, 160, s);
    drawLabel(lm.x, lm.y - 155, 'LAMPA', s);
  });

  // Checkpoint
  if (level.checkpoint) {
    const cp = level.checkpoint;
    ctx.fillStyle = COLORS.checkpoint;
    ctx.beginPath();
    ctx.moveTo(cp.x * s, (cp.y - 20) * s);
    ctx.lineTo((cp.x + 8) * s, cp.y * s);
    ctx.lineTo((cp.x - 8) * s, cp.y * s);
    ctx.closePath(); ctx.fill();
    if (isSelected('checkpoint', 0)) {
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
    }
    drawLabel(cp.x, cp.y - 26, 'START', s);
  }

  // Foreground wires
  (level.foregroundWires || []).forEach((w, i) => {
    ctx.strokeStyle = COLORS.wire;
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 4]);
    ctx.beginPath();
    ctx.moveTo(w.x1 * s, w.y1 * s);
    ctx.lineTo(w.x2 * s, w.y2 * s);
    ctx.stroke();
    ctx.setLineDash([]);
    if (isSelected('wire', i)) {
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 1;
      ctx.strokeRect(Math.min(w.x1, w.x2) * s - 4, Math.min(w.y1, w.y2) * s - 4,
        Math.abs(w.x2 - w.x1) * s + 8, Math.abs(w.y2 - w.y1) * s + 8);
    }
  });

  // Drawing preview
  if (drawing && drawRect) {
    ctx.strokeStyle = '#0f8';
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 4]);
    ctx.strokeRect(drawRect.x * s, drawRect.y * s, drawRect.w * s, drawRect.h * s);
    ctx.setLineDash([]);
  }

  // Status
  document.getElementById('status').textContent =
    `${level.name} | ${level.worldWidth}x${level.worldHeight} | Narzedzie: ${tool}`;
}

function drawRect2(x, y, w, h, color, sel) {
  const s = getScale();
  ctx.fillStyle = color;
  ctx.fillRect(x * s, y * s, w * s, h * s);
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 1;
  ctx.strokeRect(x * s, y * s, w * s, h * s);
  if (sel) drawSelectionBorder(x, y, w, h, s);
}

function drawSelectionBorder(x, y, w, h, s) {
  ctx.strokeStyle = '#0f8';
  ctx.lineWidth = 2;
  ctx.setLineDash([5, 3]);
  ctx.strokeRect(x * s - 2, y * s - 2, w * s + 4, h * s + 4);
  ctx.setLineDash([]);
  // Resize handle
  ctx.fillStyle = '#0f8';
  ctx.fillRect((x + w) * s - 4, (y + h) * s - 4, 8, 8);
}

function drawLabel(cx, cy, text, s) {
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.font = `${Math.max(9, 11 * s)}px monospace`;
  ctx.textAlign = 'center';
  ctx.fillText(text, cx * s, cy * s + 4);
}

// Draw a tiled image across a rectangular area with rounded-rect clip (like GameScene platforms)
function _drawTiledAsset(ctx, img, x, y, w, h, s, cornerR) {
  ctx.save();
  const sx = x * s, sy = y * s, sw = w * s, sh = h * s;
  const cr = (cornerR || 0) * s;
  if (cr > 0) {
    ctx.beginPath();
    ctx.moveTo(sx + cr, sy);
    ctx.lineTo(sx + sw - cr, sy);
    ctx.quadraticCurveTo(sx + sw, sy, sx + sw, sy + cr);
    ctx.lineTo(sx + sw, sy + sh - cr);
    ctx.quadraticCurveTo(sx + sw, sy + sh, sx + sw - cr, sy + sh);
    ctx.lineTo(sx + cr, sy + sh);
    ctx.quadraticCurveTo(sx, sy + sh, sx, sy + sh - cr);
    ctx.lineTo(sx, sy + cr);
    ctx.quadraticCurveTo(sx, sy, sx + cr, sy);
    ctx.closePath();
    ctx.clip();
  }
  const srcW = img.width;
  const tileScale = sh / img.height;
  const tileW = srcW * tileScale;
  for (let tx = sx; tx < sx + sw; tx += tileW) {
    ctx.drawImage(img, tx, sy, tileW, sh);
  }
  ctx.restore();
}

// Draw a single brick wall rectangle
// Get fill wall rectangles — explicit or auto-generated from platforms
function _getWallRects(level) {
  if (level.fillWalls && level.fillWalls.length > 0) {
    return level.fillWalls.map(fw => ({ x: fw.x, y: fw.y, w: fw.w, h: fw.h }));
  }
  const BLOCK_H = 32;
  const surfaces = [];
  (level.ground || []).forEach(g => surfaces.push({ x: g.x, y: g.y, w: g.w }));
  (level.platforms || []).forEach(p => surfaces.push({ x: p.x, y: p.y, w: p.w }));
  const rects = [];
  (level.platforms || []).forEach(p => {
    const pBottom = p.y + BLOCK_H;
    let bestY = null;
    for (const sf of surfaces) {
      if (sf === p) continue;
      if (sf.y <= pBottom) continue;
      if (sf.x >= p.x + p.w || sf.x + sf.w <= p.x) continue;
      if (bestY === null || sf.y < bestY) bestY = sf.y;
    }
    if (bestY === null) return;
    const wallH = bestY - pBottom;
    if (wallH < 4) return;
    rects.push({ x: p.x, y: pBottom, w: p.w, h: wallH });
  });
  return rects;
}

function _drawBrickWall(ctx, wx, wy, w, h, s) {
  const bw = 24, bh = 12, gap = 2;
  const color1 = '#2c284c', color2 = '#48374d', bgColor = '#1b1d40';
  ctx.fillStyle = bgColor;
  ctx.fillRect(wx * s, wy * s, w * s, h * s);
  const cols = Math.ceil(w / (bw + gap));
  const rows = Math.ceil(h / (bh + gap));
  for (let r = 0; r < rows; r++) {
    const rowOff = (r % 2) * Math.round((bw + gap) / 2);
    const by = r * (bh + gap);
    if (by >= h) break;
    const brickH = Math.min(bh, h - by);
    for (let c = -1; c <= cols; c++) {
      const bx = c * (bw + gap) + rowOff;
      if (bx + bw <= 0 || bx >= w) continue;
      const drawX = Math.max(0, bx);
      const drawW = Math.min(bx + bw, w) - drawX;
      if (drawW <= 0) continue;
      ctx.fillStyle = (r + c) % 3 === 0 ? color2 : color1;
      ctx.fillRect((wx + drawX) * s, (wy + by) * s, drawW * s, brickH * s);
    }
  }
}

// Draw fill walls under platforms (brick walls matching GameScene)
function _drawFillWalls(ctx, level, s) {
  const BLOCK_H = 32;
  const surfaces = [];
  (level.ground || []).forEach(g => surfaces.push({ x: g.x, y: g.y, w: g.w }));
  (level.platforms || []).forEach(p => surfaces.push({ x: p.x, y: p.y, w: p.w }));

  (level.platforms || []).forEach(p => {
    const pBottom = p.y + BLOCK_H;
    let bestY = null;
    for (const sf of surfaces) {
      if (sf === p) continue;
      if (sf.y <= pBottom) continue;
      if (sf.x >= p.x + p.w || sf.x + sf.w <= p.x) continue;
      if (bestY === null || sf.y < bestY) bestY = sf.y;
    }
    if (bestY === null) return;
    const wallH = bestY - pBottom;
    if (wallH < 4) return;

    // Draw brick fill wall
    const bw = 24, bh = 12, gap = 2;
    const color1 = '#2c284c', color2 = '#48374d', bgColor = '#1b1d40';
    ctx.fillStyle = bgColor;
    ctx.fillRect(p.x * s, pBottom * s, p.w * s, wallH * s);
    const cols = Math.ceil(p.w / (bw + gap));
    const rows = Math.ceil(wallH / (bh + gap));
    for (let r = 0; r < rows; r++) {
      const rowOff = (r % 2) * Math.round((bw + gap) / 2);
      const by = r * (bh + gap);
      if (by >= wallH) break;
      const brickH = Math.min(bh, wallH - by);
      for (let c = -1; c <= cols; c++) {
        const bx = c * (bw + gap) + rowOff;
        if (bx + bw <= 0 || bx >= p.w) continue;
        const drawX = Math.max(0, bx);
        const drawW = Math.min(bx + bw, p.w) - drawX;
        if (drawW <= 0) continue;
        ctx.fillStyle = (r + c) % 3 === 0 ? color2 : color1;
        ctx.fillRect((p.x + drawX) * s, (pBottom + by) * s, drawW * s, brickH * s);
      }
    }
  });
}

function isSelected(type, index) {
  return selected && selected.type === type && selected.index === index;
}

// ============================================================
// HIT TESTING
// ============================================================
function hitTest(mx, my) {
  // Check each element type, return { type, index } or null
  // Order: small/point items first, then rects

  // Checkpoint
  if (level.checkpoint) {
    const cp = level.checkpoint;
    if (Math.abs(mx - cp.x) < 15 && Math.abs(my - cp.y) < 25) return { type: 'checkpoint', index: 0 };
  }

  // Paint cans
  for (let i = (level.paintCans || []).length - 1; i >= 0; i--) {
    const c = level.paintCans[i];
    if (Math.hypot(mx - c.x, my - c.y) < 15) return { type: 'paintCan', index: i };
  }

  // Lamps
  for (let i = (level.lamps || []).length - 1; i >= 0; i--) {
    const lm = level.lamps[i];
    if (Math.abs(mx - lm.x) < 25 && my >= lm.y - 155 && my <= lm.y) return { type: 'lamp', index: i };
  }

  // Trash cans
  for (let i = (level.trashCans || []).length - 1; i >= 0; i--) {
    const t = level.trashCans[i];
    if (Math.abs(mx - t.x) < 18 && Math.abs(my - t.y) < 18) return { type: 'trashCan', index: i };
  }

  // Papers
  for (let i = (level.papers || []).length - 1; i >= 0; i--) {
    const p = level.papers[i];
    if (Math.abs(mx - p.x) < 20 && my >= p.y - 30 && my <= p.y + 4) return { type: 'paper', index: i };
  }

  // Cops
  for (let i = (level.cops || []).length - 1; i >= 0; i--) {
    const c = level.cops[i];
    if (Math.abs(mx - c.x) < 20 && Math.abs(my - c.y) < 30) return { type: 'cop', index: i };
  }

  // Ladders
  for (let i = (level.ladders || []).length - 1; i >= 0; i--) {
    const l = level.ladders[i];
    const lMinY = Math.min(l.topY, l.bottomY), lMaxY = Math.max(l.topY, l.bottomY);
    if (mx >= l.x - 18 && mx <= l.x + 18 && my >= lMinY && my <= lMaxY) return { type: 'ladder', index: i };
  }

  // Platforms
  for (let i = (level.platforms || []).length - 1; i >= 0; i--) {
    const p = level.platforms[i];
    if (mx >= p.x && mx <= p.x + p.w && my >= p.y && my <= p.y + 32) return { type: 'platform', index: i };
  }

  // Ground
  for (let i = (level.ground || []).length - 1; i >= 0; i--) {
    const g = level.ground[i];
    if (mx >= g.x && mx <= g.x + g.w && my >= g.y && my <= g.y + 32) return { type: 'ground', index: i };
  }

  // Paint spots (center-origin)
  for (let i = (level.paintSpots || []).length - 1; i >= 0; i--) {
    const ps = level.paintSpots[i];
    if (mx >= ps.x - ps.w / 2 && mx <= ps.x + ps.w / 2 && my >= ps.y - ps.h / 2 && my <= ps.y + ps.h / 2)
      return { type: 'paintSpot', index: i };
  }

  // Shadows
  for (let i = (level.shadows || []).length - 1; i >= 0; i--) {
    const sh = level.shadows[i];
    if (mx >= sh.x && mx <= sh.x + sh.w && my >= sh.y && my <= sh.y + sh.h) return { type: 'shadow', index: i };
  }

  // Fill walls
  for (let i = (level.fillWalls || []).length - 1; i >= 0; i--) {
    const fw = level.fillWalls[i];
    if (mx >= fw.x && mx <= fw.x + fw.w && my >= fw.y && my <= fw.y + fw.h) return { type: 'fillWall', index: i };
  }

  // Wires
  for (let i = (level.foregroundWires || []).length - 1; i >= 0; i--) {
    const w = level.foregroundWires[i];
    const minX = Math.min(w.x1, w.x2), maxX = Math.max(w.x1, w.x2);
    const minY = Math.min(w.y1, w.y2), maxY = Math.max(w.y1, w.y2);
    if (mx >= minX - 10 && mx <= maxX + 10 && my >= minY - 10 && my <= maxY + 10) return { type: 'wire', index: i };
  }

  return null;
}

// ============================================================
// GET/SET element position helpers
// ============================================================
function getElemPos(sel) {
  const arr = getArray(sel.type);
  if (!arr || !arr[sel.index]) return null;
  const e = arr[sel.index];
  switch (sel.type) {
    case 'platform': case 'ground': return { x: e.x, y: e.y };
    case 'shadow': return { x: e.x, y: e.y };
    case 'fillWall': return { x: e.x, y: e.y };
    case 'ladder': return { x: e.x, y: e.topY };
    case 'paintSpot': return { x: e.x, y: e.y };
    case 'paintCan': return { x: e.x, y: e.y };
    case 'cop': return { x: e.x, y: e.y };
    case 'trashCan': return { x: e.x, y: e.y };
    case 'lamp': return { x: e.x, y: e.y };
    case 'paper': return { x: e.x, y: e.y };
    case 'checkpoint': return { x: level.checkpoint.x, y: level.checkpoint.y };
    case 'wire': return { x: e.x1, y: e.y1 };
  }
}

function moveElem(sel, dx, dy) {
  const arr = getArray(sel.type);
  if (!arr || !arr[sel.index]) return;
  const e = arr[sel.index];
  switch (sel.type) {
    case 'platform': case 'ground': e.x += dx; e.y += dy; break;
    case 'shadow': e.x += dx; e.y += dy; break;
    case 'fillWall': e.x += dx; e.y += dy; break;
    case 'ladder': e.x += dx; e.topY += dy; e.bottomY += dy; e.minX += dx; e.maxX += dx; break;
    case 'paintSpot': e.x += dx; e.y += dy; break;
    case 'paintCan': e.x += dx; e.y += dy; break;
    case 'cop': e.x += dx; e.y += dy; e.minX += dx; e.maxX += dx; break;
    case 'trashCan': e.x += dx; e.y += dy; break;
    case 'paper': e.x += dx; e.y += dy; break;
    case 'lamp': e.x += dx; e.y += dy; break;
    case 'checkpoint': level.checkpoint.x += dx; level.checkpoint.y += dy; break;
    case 'wire': e.x1 += dx; e.y1 += dy; e.x2 += dx; e.y2 += dy; break;
  }
}

function getArray(type) {
  switch (type) {
    case 'platform': return level.platforms;
    case 'ground': return level.ground;
    case 'ladder': return level.ladders;
    case 'shadow': return level.shadows;
    case 'fillWall': return level.fillWalls;
    case 'paintSpot': return level.paintSpots;
    case 'paintCan': return level.paintCans;
    case 'cop': return level.cops;
    case 'trashCan': return level.trashCans;
    case 'paper': return level.papers;
    case 'lamp': return level.lamps;
    case 'checkpoint': return [level.checkpoint];
    case 'wire': return level.foregroundWires;
  }
  return null;
}

// ============================================================
// SNAPPING
// ============================================================
function snap(v) {
  if (!document.getElementById('snapGrid').checked) return Math.round(v);
  const g = parseInt(document.getElementById('gridSize').value) || 10;
  return Math.round(v / g) * g;
}

// ============================================================
// UNDO
// ============================================================
function pushUndo() {
  undoStack.push(JSON.stringify(level));
  if (undoStack.length > MAX_UNDO) undoStack.shift();
  autoSave();
}

function undo() {
  if (undoStack.length === 0) return;
  const state = undoStack.pop();
  const restored = JSON.parse(state);
  Object.assign(level, restored);
  selected = null;
  autoSave();
  draw();
  showProps();
}

// ============================================================
// MOUSE EVENTS
// ============================================================
function canvasToWorld(e) {
  const rect = canvas.getBoundingClientRect();
  const s = getScale();
  return {
    x: (e.clientX - rect.left) / s,
    y: (e.clientY - rect.top) / s
  };
}

canvas.addEventListener('mousedown', (e) => {
  const pos = canvasToWorld(e);
  const mx = pos.x, my = pos.y;

  if (tool === 'select') {
    const hit = hitTest(mx, my);
    selected = hit;
    if (hit) {
      pushUndo();
      dragging = true;
      const ep = getElemPos(hit);
      dragOffset = { x: mx - ep.x, y: my - ep.y };
    }
  } else {
    // Place or start drawing
    pushUndo();
    drawing = true;
    dragStart = { x: snap(mx), y: snap(my) };
    drawRect = { x: dragStart.x, y: dragStart.y, w: 0, h: 0 };
  }

  draw();
  showProps();
});

canvas.addEventListener('mousemove', (e) => {
  const pos = canvasToWorld(e);

  if (dragging && selected) {
    const ep = getElemPos(selected);
    const dx = snap(pos.x - dragOffset.x) - ep.x;
    const dy = snap(pos.y - dragOffset.y) - ep.y;
    moveElem(selected, dx, dy);
    draw();
    showProps();
  }

  if (drawing) {
    const ex = snap(pos.x), ey = snap(pos.y);
    drawRect = {
      x: Math.min(dragStart.x, ex),
      y: Math.min(dragStart.y, ey),
      w: Math.abs(ex - dragStart.x),
      h: Math.abs(ey - dragStart.y),
    };
    draw();
  }
});

canvas.addEventListener('mouseup', (e) => {
  if (dragging) {
    dragging = false;
    draw();
    showProps();
    return;
  }

  if (drawing) {
    drawing = false;
    const pos = canvasToWorld(e);
    const ex = snap(pos.x), ey = snap(pos.y);
    const r = drawRect || { x: dragStart.x, y: dragStart.y, w: 0, h: 0 };

    // Create element
    createElement(tool, r, dragStart, { x: ex, y: ey });
    drawRect = null;
    draw();
    showProps();
  }
});

function createElement(type, r, start, end) {
  const w = Math.max(r.w, 10);
  const h = Math.max(r.h, 10);

  switch (type) {
    case 'platform':
      if (!level.platforms) level.platforms = [];
      level.platforms.push({ x: r.x, y: r.y, w: Math.max(w, 32) });
      selected = { type: 'platform', index: level.platforms.length - 1 };
      break;
    case 'ground':
      if (!level.ground) level.ground = [];
      level.ground.push({ x: r.x, y: r.y, w: Math.max(w, 32) });
      selected = { type: 'ground', index: level.ground.length - 1 };
      break;
    case 'ladder':
      if (!level.ladders) level.ladders = [];
      level.ladders.push({
        x: Math.round((r.x + w / 2)),
        topY: r.y, bottomY: r.y + Math.max(h, 60),
        minX: r.x - 20, maxX: r.x + w + 20
      });
      selected = { type: 'ladder', index: level.ladders.length - 1 };
      break;
    case 'shadow':
      if (!level.shadows) level.shadows = [];
      level.shadows.push({ x: r.x, y: r.y, w: Math.max(w, 30), h: Math.max(h, 30) });
      selected = { type: 'shadow', index: level.shadows.length - 1 };
      break;
    case 'fillWall':
      if (!level.fillWalls) level.fillWalls = [];
      level.fillWalls.push({ x: r.x, y: r.y, w: Math.max(w, 32), h: Math.max(h, 32) });
      selected = { type: 'fillWall', index: level.fillWalls.length - 1 };
      break;
    case 'paintSpot':
      if (!level.paintSpots) level.paintSpots = [];
      level.paintSpots.push({
        x: Math.round(r.x + w / 2), y: Math.round(r.y + h / 2),
        w: Math.max(w, 40), h: Math.max(h, 40),
        paintingKey: Object.keys(muralCache).sort()[0] || 'painting_new'
      });
      selected = { type: 'paintSpot', index: level.paintSpots.length - 1 };
      break;
    case 'paintCan':
      if (!level.paintCans) level.paintCans = [];
      level.paintCans.push({ x: start.x, y: start.y });
      selected = { type: 'paintCan', index: level.paintCans.length - 1 };
      break;
    case 'cop':
      if (!level.cops) level.cops = [];
      level.cops.push({
        x: start.x, y: start.y,
        minX: start.x - 100, maxX: start.x + 100
      });
      selected = { type: 'cop', index: level.cops.length - 1 };
      break;
    case 'trashCan':
      if (!level.trashCans) level.trashCans = [];
      level.trashCans.push({ x: start.x, y: start.y });
      selected = { type: 'trashCan', index: level.trashCans.length - 1 };
      break;
    case 'paper':
      if (!level.papers) level.papers = [];
      level.papers.push({ x: start.x, y: start.y });
      selected = { type: 'paper', index: level.papers.length - 1 };
      break;
    case 'lamp':
      if (!level.lamps) level.lamps = [];
      level.lamps.push({ x: start.x, y: start.y, radius: 120, intensity: 0.35 });
      selected = { type: 'lamp', index: level.lamps.length - 1 };
      break;
    case 'checkpoint':
      level.checkpoint = { x: start.x, y: start.y };
      selected = { type: 'checkpoint', index: 0 };
      break;
    case 'wire':
      if (!level.foregroundWires) level.foregroundWires = [];
      level.foregroundWires.push({ x1: start.x, y1: start.y, x2: end.x, y2: end.y });
      selected = { type: 'wire', index: level.foregroundWires.length - 1 };
      break;
  }
}

// ============================================================
// PROPERTIES PANEL
// ============================================================
function showProps() {
  const panel = document.getElementById('props');
  if (!selected) { panel.style.display = 'none'; return; }

  const arr = getArray(selected.type);
  if (!arr || !arr[selected.index]) { panel.style.display = 'none'; return; }
  const e = arr[selected.index];

  panel.style.display = 'block';
  let html = `<b>${selected.type} #${selected.index}</b> &nbsp; `;

  const field = (name, val) =>
    `<label>${name}: <input data-field="${name}" value="${Math.round(val)}" /></label>`;

  switch (selected.type) {
    case 'platform': case 'ground':
      html += field('x', e.x) + field('y', e.y) + field('w', e.w) + field('depth', e.depth ?? '');
      break;
    case 'shadow':
      html += field('x', e.x) + field('y', e.y) + field('w', e.w) + field('h', e.h) + field('depth', e.depth ?? '');
      break;
    case 'fillWall':
      html += field('x', e.x) + field('y', e.y) + field('w', e.w) + field('h', e.h) + field('depth', e.depth ?? '');
      break;
    case 'ladder':
      html += field('x', e.x) + field('topY', e.topY) + field('bottomY', e.bottomY) + field('minX', e.minX) + field('maxX', e.maxX) + field('depth', e.depth ?? '');
      break;
    case 'paintSpot': {
      html += field('x', e.x) + field('y', e.y) + field('w', e.w) + field('h', e.h) + field('depth', e.depth ?? '');
      // Dropdown with available murals from muralCache
      const muralKeys = Object.keys(muralCache).sort();
      html += ` <label>Wzór: <select data-field="paintingKey" style="width:160px;background:#333;color:#eee;border:1px solid #555;font-family:monospace;font-size:12px">`;
      // Current value might not be in cache yet
      const curKey = e.paintingKey || '';
      if (curKey && !muralKeys.includes(curKey)) {
        html += `<option value="${curKey}" selected>${curKey} (brak pliku!)</option>`;
      }
      muralKeys.forEach(k => {
        const sel = k === curKey ? ' selected' : '';
        html += `<option value="${k}"${sel}>${k.replace('painting_', '')}</option>`;
      });
      html += `</select></label>`;
      html += ` <button onclick="window.open('/tools/mural-editor.html?key=${encodeURIComponent(curKey)}&spotW=${e.w}&spotH=${e.h}','_blank')" style="margin-left:4px;background:#530;border-color:#a60;padding:4px 10px;cursor:pointer;color:#fc0;font-weight:bold;">Edytuj</button>`;
      html += ` <button onclick="createNewMuralForSpot(${selected.index})" style="margin-left:4px;background:#035;border-color:#08f;padding:4px 10px;cursor:pointer;color:#0cf;font-weight:bold;">+ Nowy mural</button>`;
      break;
    }
    case 'paintCan':
      html += field('x', e.x) + field('y', e.y) + field('depth', e.depth ?? '');
      html += ` <label>color: <select data-field="color" style="width:100px;background:#333;color:#eee;border:1px solid #555;font-family:monospace;font-size:12px">`;
      ['', 'RED', 'BLUE', 'YELLOW', 'GREEN'].forEach(c => {
        const sel = (e.color || '') === c ? ' selected' : '';
        html += `<option value="${c}"${sel}>${c || '(auto)'}</option>`;
      });
      html += `</select></label>`;
      break;
    case 'cop':
      html += field('x', e.x) + field('y', e.y) + field('minX', e.minX) + field('maxX', e.maxX) + field('depth', e.depth ?? '');
      break;
    case 'trashCan':
      html += field('x', e.x) + field('y', e.y) + field('depth', e.depth ?? '');
      break;
    case 'paper':
      html += field('x', e.x) + field('y', e.y) + field('angle', e.angle ?? 0);
      break;
    case 'lamp':
      html += field('x', e.x) + field('y', e.y) + field('radius', e.radius || 120) + field('depth', e.depth ?? '');
      html += ` <label>Intensywnosc: <input data-field="intensity" type="range" min="0.05" max="1" step="0.05" value="${e.intensity || 0.35}" style="width:80px;vertical-align:middle" /></label>`;
      break;
    case 'checkpoint':
      html += field('x', e.x) + field('y', e.y);
      break;
    case 'wire':
      html += field('x1', e.x1) + field('y1', e.y1) + field('x2', e.x2) + field('y2', e.y2) + field('depth', e.depth ?? '');
      break;
  }

  panel.innerHTML = html;

  // Bind inputs and selects
  panel.querySelectorAll('input, select').forEach(inp => {
    inp.addEventListener('change', () => {
      pushUndo();
      const f = inp.dataset.field;
      let v;
      if (f === 'paintingKey' || f === 'color') { v = inp.value || undefined; }
      else if (f === 'depth' || f === 'intensity') { v = inp.value.trim() === '' ? undefined : parseFloat(inp.value); }
      else { v = parseInt(inp.value); }
      if (selected.type === 'checkpoint') {
        level.checkpoint[f] = v;
      } else {
        arr[selected.index][f] = v;
      }
      autoSave();
      draw();
    });
  });
}

// ============================================================
// KEYBOARD
// ============================================================
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;

  if (e.key === 'Delete' || e.key === 'Backspace') {
    deleteSelected();
    e.preventDefault();
  }
  if (e.key === 'd' || e.key === 'D') {
    duplicateSelected();
  }
  if (e.ctrlKey && e.key === 'z') {
    undo();
    e.preventDefault();
  }
  if (e.ctrlKey && e.key === 's') {
    exportLevels();
    e.preventDefault();
  }
  // Arrow keys nudge
  if (selected && ['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown'].includes(e.key)) {
    pushUndo();
    const step = e.shiftKey ? 10 : 1;
    const dx = e.key === 'ArrowLeft' ? -step : e.key === 'ArrowRight' ? step : 0;
    const dy = e.key === 'ArrowUp' ? -step : e.key === 'ArrowDown' ? step : 0;
    moveElem(selected, dx, dy);
    draw();
    showProps();
    e.preventDefault();
  }
});

function deleteSelected() {
  if (!selected) return;
  if (selected.type === 'checkpoint') return; // can't delete checkpoint
  pushUndo();
  const arr = getArray(selected.type);
  if (arr) arr.splice(selected.index, 1);
  selected = null;
  draw();
  showProps();
}

function duplicateSelected() {
  if (!selected) return;
  if (selected.type === 'checkpoint') return;
  pushUndo();
  const arr = getArray(selected.type);
  if (!arr || !arr[selected.index]) return;
  const clone = JSON.parse(JSON.stringify(arr[selected.index]));
  // Offset the clone
  if ('x' in clone) clone.x += 30;
  if ('y' in clone && selected.type !== 'ladder') clone.y += 30;
  if ('topY' in clone) { clone.topY += 30; clone.bottomY += 30; }
  if ('minX' in clone) { clone.minX += 30; clone.maxX += 30; }
  if ('x1' in clone) { clone.x1 += 30; clone.x2 += 30; }
  if ('y1' in clone) { clone.y1 += 30; clone.y2 += 30; }
  arr.push(clone);
  selected = { type: selected.type, index: arr.length - 1 };
  draw();
  showProps();
}

// ============================================================
// EXPORT
// ============================================================
function generateExport() {
  let out = `import { GAME } from './gameConfig.js';\n\nconst H = GAME.HEIGHT;\nconst W = GAME.WIDTH;\n\n`;

  levels.forEach((lv, li) => {
    const WW = lv.worldWidth;
    const HH = lv.worldHeight;
    const isStdSize = WW === GAME_W && HH === GAME_H;
    const varName = `LEVEL_${li + 1}`;
    let hVar = 'H', wVar = 'W';

    if (!isStdSize) {
      const prefix = `L${li + 1}_`;
      wVar = `${prefix}W`;
      hVar = `${prefix}H`;
      out += `const ${wVar} = ${WW};\nconst ${hVar} = ${HH};\n\n`;
    }

    const rel = (v, base, bVar) => {
      const diff = base - v;
      if (diff === 0) return bVar;
      if (diff > 0) return `${bVar} - ${diff}`;
      return `${bVar} + ${-diff}`;
    };
    const dp = (obj) => obj.depth != null ? `, depth: ${obj.depth}` : '';

    out += `export const ${varName} = {\n`;
    out += `  name: '${lv.name}',\n`;
    out += `  mode: '${lv.mode || 'stealth'}',\n`;
    out += `  description: '${lv.description}',\n`;
    out += `  worldWidth: ${wVar},\n`;
    out += `  worldHeight: ${hVar},\n`;
    out += `  checkpoint: { x: ${lv.checkpoint.x}, y: ${rel(lv.checkpoint.y, HH, hVar)} },\n`;
    out += `  paintings: [${(lv.paintings || []).map(p => `'${p}'`).join(', ')}],\n\n`;

    // Platforms
    out += `  platforms: [\n`;
    (lv.platforms || []).forEach(p => {
      out += `    { x: ${Math.round(p.x)}, y: ${rel(Math.round(p.y), HH, hVar)}, w: ${Math.round(p.w)}${dp(p)} },\n`;
    });
    out += `  ],\n`;

    // Ground
    out += `  ground: [\n`;
    (lv.ground || []).forEach(g => {
      out += `    { x: ${Math.round(g.x)}, y: ${rel(Math.round(g.y), HH, hVar)}, w: ${g.w === WW ? wVar : Math.round(g.w)}${dp(g)} },\n`;
    });
    out += `  ],\n`;

    // Ladders
    out += `  ladders: [\n`;
    (lv.ladders || []).forEach(l => {
      out += `    { x: ${Math.round(l.x)}, topY: ${rel(Math.round(l.topY), HH, hVar)}, bottomY: ${rel(Math.round(l.bottomY), HH, hVar)}, minX: ${Math.round(l.minX)}, maxX: ${Math.round(l.maxX)}${dp(l)} },\n`;
    });
    out += `  ],\n`;

    // Shadows
    out += `  shadows: [\n`;
    (lv.shadows || []).forEach(s => {
      out += `    { x: ${Math.round(s.x)}, y: ${rel(Math.round(s.y), HH, hVar)}, w: ${Math.round(s.w)}, h: ${Math.round(s.h)}${dp(s)} },\n`;
    });
    out += `  ],\n`;

    // Fill walls (explicit, optional)
    if (lv.fillWalls && lv.fillWalls.length > 0) {
      out += `  fillWalls: [\n`;
      lv.fillWalls.forEach(fw => {
        out += `    { x: ${Math.round(fw.x)}, y: ${rel(Math.round(fw.y), HH, hVar)}, w: ${Math.round(fw.w)}, h: ${Math.round(fw.h)}${dp(fw)} },\n`;
      });
      out += `  ],\n`;
    }

    // Paint cans
    out += `  paintCans: [\n`;
    (lv.paintCans || []).forEach(c => {
      const col = c.color ? `, color: '${c.color}'` : '';
      out += `    { x: ${Math.round(c.x)}, y: ${rel(Math.round(c.y), HH, hVar)}${col}${dp(c)} },\n`;
    });
    out += `  ],\n`;

    // Paint spots
    out += `  paintSpots: [\n`;
    (lv.paintSpots || []).forEach(ps => {
      out += `    { x: ${Math.round(ps.x)}, y: ${rel(Math.round(ps.y), HH, hVar)}, w: ${Math.round(ps.w)}, h: ${Math.round(ps.h)}, paintingKey: '${ps.paintingKey}'${dp(ps)} },\n`;
    });
    out += `  ],\n`;

    // Trash cans
    out += `  trashCans: [\n`;
    (lv.trashCans || []).forEach(t => {
      out += `    { x: ${Math.round(t.x)}, y: ${rel(Math.round(t.y), HH, hVar)}${dp(t)} },\n`;
    });
    out += `  ],\n`;

    // Cops
    out += `  cops: [\n`;
    (lv.cops || []).forEach(c => {
      out += `    { x: ${Math.round(c.x)}, y: ${rel(Math.round(c.y), HH, hVar)}, minX: ${Math.round(c.minX)}, maxX: ${c.maxX === WW - 40 ? `${wVar} - 40` : Math.round(c.maxX)}${dp(c)} },\n`;
    });
    out += `  ],\n`;

    // Lamps
    if (lv.lamps && lv.lamps.length > 0) {
      out += `  lamps: [\n`;
      lv.lamps.forEach(lm => {
        const extra = lm.intensity != null && lm.intensity !== 0.35 ? `, intensity: ${lm.intensity}` : '';
        out += `    { x: ${Math.round(lm.x)}, y: ${rel(Math.round(lm.y), HH, hVar)}, radius: ${Math.round(lm.radius || 120)}${extra}${dp(lm)} },\n`;
      });
      out += `  ],\n`;
    }

    // Papers
    if (lv.papers && lv.papers.length > 0) {
      out += `  papers: [\n`;
      lv.papers.forEach(p => {
        const ang = p.angle != null && p.angle !== 0 ? `, angle: ${Math.round(p.angle)}` : '';
        out += `    { x: ${Math.round(p.x)}, y: ${rel(Math.round(p.y), HH, hVar)}${ang} },\n`;
      });
      out += `  ],\n`;
    }

    // Wires
    out += `  foregroundWires: [\n`;
    (lv.foregroundWires || []).forEach(w => {
      out += `    { x1: ${Math.round(w.x1)}, y1: ${rel(Math.round(w.y1), HH, hVar)}, x2: ${w.x2 === WW ? wVar : Math.round(w.x2)}, y2: ${rel(Math.round(w.y2), HH, hVar)}${dp(w)} },\n`;
    });
    out += `  ],\n`;

    out += `};\n\n`;
  });

  out += `export const LEVELS = [${levels.map((_, i) => `LEVEL_${i + 1}`).join(', ')}];\n\n`;
  const byMode = { stealth: [], puzzle: [], tower: [] };
  levels.forEach((lv, i) => {
    const m = lv.mode || 'stealth';
    if (byMode[m]) byMode[m].push(`LEVEL_${i + 1}`);
  });
  out += `export const STEALTH_LEVELS = [${byMode.stealth.join(', ')}];\n`;
  out += `export const PUZZLE_LEVELS = [${byMode.puzzle.join(', ')}];\n`;
  out += `export const TOWER_LEVELS = [${byMode.tower.join(', ')}];\n`;
  return out;
}

function exportLevels() {
  const code = generateExport();
  const blob = new Blob([code], { type: 'text/javascript' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'levels.js';
  a.click();
}

// Tool buttons
document.querySelectorAll('.tool-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    tool = btn.dataset.tool;
    document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (tool !== 'select') selected = null;
    draw();
    showProps();
  });
});

// Level select
const levelSelect = document.getElementById('levelSelect');
const levelModeFilter = document.getElementById('levelModeFilter');

function getActiveModeFilter() {
  return levelModeFilter.value || 'stealth';
}

function getFilteredLevelEntries() {
  const mode = getActiveModeFilter();
  return levels
    .map((lv, i) => ({ lv, i }))
    .filter(({ lv }) => (lv.mode || 'stealth') === mode);
}

function refreshLevelSelect() {
  const filteredLevels = getFilteredLevelEntries();
  if (filteredLevels.length === 0) {
    const fallbackMode = ['stealth', 'puzzle', 'tower']
      .find(mode => levels.some(lv => (lv.mode || 'stealth') === mode));
    if (fallbackMode && fallbackMode !== getActiveModeFilter()) {
      levelModeFilter.value = fallbackMode;
      return refreshLevelSelect();
    }
  }

  levelSelect.innerHTML = '';
  filteredLevels.forEach(({ lv, i }, visibleIdx) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = `${visibleIdx + 1}. ${lv.name}`;
    levelSelect.appendChild(opt);
  });

  const currentVisible = filteredLevels.some(({ i }) => i === currentLevelIdx);
  if (!currentVisible && filteredLevels.length > 0) {
    currentLevelIdx = filteredLevels[0].i;
    level = levels[currentLevelIdx];
  }

  if (filteredLevels.length > 0) levelSelect.value = String(currentLevelIdx);
  refreshLevelMeta();
}

function refreshLevelMeta() {
  document.getElementById('metaName').value = level.name || '';
  document.getElementById('metaDesc').value = level.description || '';
  document.getElementById('metaW').value = level.worldWidth;
  document.getElementById('metaH').value = level.worldHeight;
  document.getElementById('metaMode').value = level.mode || 'stealth';
  levelModeFilter.value = level.mode || 'stealth';
}

function switchToLevel(idx) {
  currentLevelIdx = idx;
  level = levels[currentLevelIdx];
  selected = null;
  undoStack = [];
  levelSelect.value = idx;
  refreshLevelMeta();
  resizeCanvas();
  draw();
  showProps();
}

refreshLevelSelect();

levelModeFilter.addEventListener('change', () => {
  refreshLevelSelect();
  if (levelSelect.value !== '') switchToLevel(parseInt(levelSelect.value, 10));
});

levelSelect.addEventListener('change', () => {
  switchToLevel(parseInt(levelSelect.value, 10));
});

// Level meta editors
['metaName', 'metaDesc', 'metaW', 'metaH', 'metaMode'].forEach(id => {
  document.getElementById(id).addEventListener('change', () => {
    pushUndo();
    level.name = document.getElementById('metaName').value.trim() || 'Nowy';
    level.description = document.getElementById('metaDesc').value.trim();
    const newW = parseInt(document.getElementById('metaW').value) || level.worldWidth;
    const newH = parseInt(document.getElementById('metaH').value) || level.worldHeight;
    level.worldWidth = Math.max(400, newW);
    level.worldHeight = Math.max(400, newH);
    level.mode = document.getElementById('metaMode').value;
    levelModeFilter.value = level.mode;
    // Auto-derive paintings from paintSpots
    level.paintings = [...new Set((level.paintSpots || []).map(ps => ps.paintingKey).filter(Boolean))];
    refreshLevelSelect();
    resizeCanvas();
    draw();
    autoSave();
  });
});

// Add new level
document.getElementById('btnAddLevel').addEventListener('click', () => {
  const newLevel = {
    name: 'Nowy Level', description: '',
    mode: getActiveModeFilter(),
    worldWidth: GAME_W, worldHeight: GAME_H,
    checkpoint: { x: 60, y: GAME_H - 101 },
    paintings: [],
    platforms: [],
    ground: [{ x: 0, y: GAME_H - 32, w: GAME_W }],
    ladders: [],
    shadows: [],
    paintCans: [],
    paintSpots: [],
    trashCans: [],
    cops: [],
    lamps: [],
    foregroundWires: [],
  };
  levels.push(newLevel);
  refreshLevelSelect();
  switchToLevel(levels.length - 1);
  autoSave();
});

// Delete current level
document.getElementById('btnDelLevel').addEventListener('click', () => {
  if (levels.length <= 1) { alert('Musi zostac przynajmniej 1 level.'); return; }
  if (!confirm(`Usunac level "${level.name}"?`)) return;
  levels.splice(currentLevelIdx, 1);
  if (currentLevelIdx >= levels.length) currentLevelIdx = levels.length - 1;
  refreshLevelSelect();
  switchToLevel(currentLevelIdx);
  autoSave();
});

// Buttons
document.getElementById('btnDelete').addEventListener('click', deleteSelected);
document.getElementById('btnDuplicate').addEventListener('click', duplicateSelected);
document.getElementById('btnExport').addEventListener('click', exportLevels);
document.getElementById('btnSaveToGame').addEventListener('click', () => {
  const btn = document.getElementById('btnSaveToGame');
  const ind = document.getElementById('saveIndicator');
  btn.disabled = true;
  btn.textContent = 'Zapisuję...';
  const code = generateExport();
  console.log('[EDITOR] Save button clicked, code length:', code.length);
  console.log('[EDITOR] Fetching:', window.location.origin + '/save');
  localStorage.setItem(STORAGE_KEY, JSON.stringify(levels));
  fetch('/save', { method: 'POST', body: code })
    .then(r => {
      console.log('[EDITOR] /save response status:', r.status);
      return r.json();
    })
    .then(data => {
      console.log('[EDITOR] /save response data:', JSON.stringify(data));
      btn.textContent = '\u2705 Zapisano! Gra się odświeży';
      btn.style.background = '#0a5';
      if (ind) { ind.textContent = 'Zapisano ' + new Date().toLocaleTimeString(); ind.style.color = '#0f8'; }
      setTimeout(() => {
        btn.innerHTML = '&#128190; Zapisz do gry';
        btn.style.background = '#085';
        btn.disabled = false;
      }, 2000);
    })
    .catch(err => {
      btn.textContent = '\u274c Błąd zapisu!';
      btn.style.background = '#a33';
      if (ind) { ind.textContent = 'Błąd: ' + err.message; ind.style.color = '#f55'; }
      setTimeout(() => {
        btn.innerHTML = '&#128190; Zapisz do gry';
        btn.style.background = '#085';
        btn.disabled = false;
      }, 3000);
    });
});
document.getElementById('btnCopy').addEventListener('click', () => {
  navigator.clipboard.writeText(generateExport()).then(() => alert('Skopiowano do schowka!'));
});
document.getElementById('btnImport').addEventListener('click', () => {
  const json = prompt('Wklej JSON levelu (caly obiekt):');
  if (!json) return;
  try {
    const parsed = JSON.parse(json);
    pushUndo();
    Object.assign(level, parsed);
    resizeCanvas();
    draw();
  } catch (e) {
    alert('Blad parsowania JSON: ' + e.message);
  }
});

// Reset
document.getElementById('btnReset').addEventListener('click', () => {
  if (!confirm('Na pewno? Wszystkie zmiany zostana utracone.')) return;
  localStorage.removeItem(STORAGE_KEY);
  levels = JSON.parse(JSON.stringify(LEVELS_SOURCE));
  level = levels[currentLevelIdx];
  selected = null;
  undoStack = [];
  resizeCanvas();
  draw();
  showProps();
  document.getElementById('saveIndicator').textContent = 'Zresetowano do domyslnych';
});

// Grid change
document.getElementById('gridSize').addEventListener('change', draw);
document.getElementById('snapGrid').addEventListener('change', draw);

// Init
window.addEventListener('resize', () => { resizeCanvas(); draw(); });
refreshLevelMeta();
resizeCanvas();
draw();
</script>
</body>
</html>
